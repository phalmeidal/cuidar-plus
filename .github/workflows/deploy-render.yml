name: Optional Render Deploy

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Trigger optional Render deploy hook
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    steps:
      - name: Trigger optional Render deploy
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        run: curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Skip Render deploy when hook is not configured
        if: env.RENDER_DEPLOY_HOOK_URL == ''
        run: echo "RENDER_DEPLOY_HOOK_URL is not configured; optional deployment skipped."
