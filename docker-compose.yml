services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cuidar_plus
      POSTGRES_USER: cuidar
      POSTGRES_PASSWORD: cuidar
    ports:
      - '5433:5432'
    volumes:
      - cuidar_plus_db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cuidar -d cuidar_plus']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://cuidar:cuidar@db:5432/cuidar_plus?schema=public
    ports:
      - '3001:3001'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3001/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_URL: http://localhost:3001
    ports:
      - '5173:80'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1/']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cuidar_plus_db:
